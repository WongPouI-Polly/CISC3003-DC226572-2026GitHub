<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CISC3003 Practice 08 - Art Filters</title>
    <link href='http://fonts.googleapis.com/css?family=Merriweather' rel='stylesheet' type='text/css'>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <style>
        #imgManipulated img {
            transition: filter 0.1s ease;
            max-width: 100%;
            height: auto;
            display: block;
        }
        #thumbBox img {
            cursor: pointer;
            border: 2px solid transparent;
            transition: border 0.2s;
        }
        #thumbBox img:hover {
            border: 2px solid #EF6C00;
        }
        .sliders {
            vertical-align: middle;
        }
        #sliderBox p {
            margin: 12px 0;
        }
        button#resetFilters {
            margin-top: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        figcaption {
            font-size: 11pt;
            line-height: 1.4;
        }
    </style>
</head>    
<body class="tiled">
<header>
    <h1>Art Filters</h1>
</header>
<main>
    <div id="sliderBox">
        <form>
           <label>Opacity: </label><p><input type="range" id="sliderOpacity" min="0" max="100" value="100" class="sliders" /> <span id="numOpacity">100</span>%</p>
           <p><label>Saturation: </label><input type="range" id="sliderSaturation" min="1" max="300" value="100" class="sliders"/> <span id="numSaturation">100</span>%</p>
           <p><label>Brightness: </label><input type="range" id="sliderBrightness" min="0" max="300" value="100" class="sliders" /> <span id="numBrightness">100</span>%</p>
           <p><label>Hue Rotate: </label><input type="range" id="sliderHue" min="0" max="360" value="0" class="sliders" /> <span id="numHue">0</span>deg</p>
           <p><label>Grayscale: </label><input type="range" id="sliderGray" min="0" max="100" value="0" class="sliders"/> <span id="numGray">0</span>%</p>
           <p><label>Blur: </label><input type="range" id="sliderBlur" min="0" max="10" value="0" class="sliders" /> <span id="numBlur">0</span>px</p>
           <p><button id="resetFilters">Reset</button> </p>
        </form>    
    </div>
    <figure id="imgManipulated">
        <img src="images/medium/painting1.jpg" alt="Still Life with Flowers in a Glass Vase" title="Jan Davidsz. de Heem, 1650 - 1683"> 
        <figcaption>
            <em>Still Life with Flowers in a Glass Vase</em> <br>
            Jan Davidsz. de Heem, 1650 - 1683
        </figcaption>
    </figure>   
    <div id="thumbBox">
        <div><img src="images/small/painting1.jpg" alt="Still Life with Flowers in a Glass Vase" title="Jan Davidsz. de Heem, 1650 - 1683"/></div>
        <div><img src="images/small/painting2.jpg" alt="Portrait of Alida Christina Assink" title="Jan Adam Kruseman, 1833"/></div>
        <div><img src="images/small/painting3.jpg" alt="Self-portrait" title="Vincent van Gogh, 1887"/></div>
        <div><img src="images/small/painting4.jpg" alt="William II, Prince of Orange, and his Bride, Mary Stuart" title="Anthony van Dyck, 1641"/></div>
        <div><img src="images/small/painting5.jpg" alt="Milkmaid" title="Johannes Vermeer, c. 1660"/></div>
    </div>
</main>

<script>
    $(document).ready(function() {
        function getCurrentFilterString() {
            let opacityVal = $('#sliderOpacity').val();
            let saturationVal = $('#sliderSaturation').val();
            let brightnessVal = $('#sliderBrightness').val();
            let hueVal = $('#sliderHue').val();
            let grayscaleVal = $('#sliderGray').val();
            let blurVal = $('#sliderBlur').val();
            
            let filters = [];
            
            filters.push(`opacity(${opacityVal}%)`);
            filters.push(`saturate(${saturationVal}%)`);
            filters.push(`brightness(${brightnessVal}%)`);
            
            if (parseInt(hueVal) !== 0) {
                filters.push(`hue-rotate(${hueVal}deg)`);
            }
            if (parseInt(grayscaleVal) !== 0) {
                filters.push(`grayscale(${grayscaleVal}%)`);
            }
            if (parseFloat(blurVal) !== 0) {
                filters.push(`blur(${blurVal}px)`);
            }
            
            return filters.join(' ');
        }
        
        function applyFilters() {
            let filterString = getCurrentFilterString();
            let $mainImg = $('#imgManipulated img');
            $mainImg.css('filter', filterString);
            $mainImg.css('-webkit-filter', filterString);
        }
        
        $('.sliders').on('input', function() {
            let id = $(this).attr('id');
            let val = $(this).val();
            switch(id) {
                case 'sliderOpacity':
                    $('#numOpacity').text(val);
                    break;
                case 'sliderSaturation':
                    $('#numSaturation').text(val);
                    break;
                case 'sliderBrightness':
                    $('#numBrightness').text(val);
                    break;
                case 'sliderHue':
                    $('#numHue').text(val);
                    break;
                case 'sliderGray':
                    $('#numGray').text(val);
                    break;
                case 'sliderBlur':
                    $('#numBlur').text(val);
                    break;
            }
            applyFilters();
        });
        
        $('#resetFilters').on('click', function(e) {
            e.preventDefault();
            $('#sliderOpacity').val(100);
            $('#sliderSaturation').val(100);
            $('#sliderBrightness').val(100);
            $('#sliderHue').val(0);
            $('#sliderGray').val(0);
            $('#sliderBlur').val(0);
            
            $('#numOpacity').text('100');
            $('#numSaturation').text('100');
            $('#numBrightness').text('100');
            $('#numHue').text('0');
            $('#numGray').text('0');
            $('#numBlur').text('0');
            
            applyFilters();
        });
        
        $('#thumbBox img').on('click', function() {
            let $thumb = $(this);
            let thumbSrc = $thumb.attr('src');
            let mainSrc = thumbSrc.replace('/small/', '/medium/');
            let altText = $thumb.attr('alt');
            let titleText = $thumb.attr('title');
            
            let $mainImg = $('#imgManipulated img');
            $mainImg.attr('src', mainSrc);
            $mainImg.attr('alt', altText);
            $mainImg.attr('title', titleText);
            
            $('#imgManipulated figcaption').html(`<em>${altText}</em><br>${titleText}`);
            
            applyFilters();
        });
        
        $('#numOpacity').text($('#sliderOpacity').val());
        $('#numSaturation').text($('#sliderSaturation').val());
        $('#numBrightness').text($('#sliderBrightness').val());
        $('#numHue').text($('#sliderHue').val());
        $('#numGray').text($('#sliderGray').val());
        $('#numBlur').text($('#sliderBlur').val());
        applyFilters();
    });
</script>
</body>   
</html>
